name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # A modified lockfile means package.json and bun.lock disagree.
      - name: Assert lockfile is clean after install
        run: git diff --exit-code bun.lock

      - name: Biome check
        run: bun run check:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # Redundant with the parity tests on purpose: this prints the per-case
      # expected/actual list and the commands to investigate with.
      - name: Oracle parity
        run: bun run oracle:check
