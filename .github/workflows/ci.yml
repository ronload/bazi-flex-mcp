name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --frozen-lockfile only asserts the lockfile is not modified by the install.
      # This catches the case where it is, which means package.json and bun.lock
      # disagree. The installed-artefact check lives in test/oracle/versions.test.ts.
      - name: Assert lockfile is clean after install
        run: git diff --exit-code bun.lock

      - name: Biome check
        run: bun run check:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # Redundant with the parity tests inside `bun test`, and deliberately so:
      # this step names the oracle in the CI log and prints the per-case
      # "expected -> actual" list plus the explain/dump commands to investigate
      # with, which an assertion failure cannot.
      - name: Oracle parity
        run: bun run oracle:check
