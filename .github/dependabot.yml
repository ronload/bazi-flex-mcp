version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # zod >= 4.4 changes internal type structure ($ZodNumberInternals etc.)
      # which breaks @modelcontextprotocol/sdk's ZodRawShapeCompat type check.
      # Tracked upstream in modelcontextprotocol/typescript-sdk#555 / #925; the
      # structural fix lands in SDK 2.0 (currently alpha). Until 2.0 stable,
      # stay on the 4.3 patch line.
      - dependency-name: "zod"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      # wrangler >= 4.86.0 bundles a miniflare that calls zod 3-only API
      # (z.ostring) at module load. With zod pinned to 4.3.x for the MCP SDK,
      # this crashes `wrangler deploy`. Re-evaluate when cloudflare/workers-sdk
      # ships a miniflare that either declares its zod dep or uses zod 4-safe API.
      - dependency-name: "wrangler"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
